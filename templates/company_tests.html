<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Company Wise Tests | Placify</title>
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body>
  <nav class="navbar">
    <div class="nav-content">
      <div class="logo">PLACIFY</div>
      <ul class="nav-links">
        <li><a href="/student">Dashboard</a></li>
        <li><a href="/tests">Tests</a></li>
        <li><a href="/company-tests">Company-wise Tests</a></li>
        <li><a href="/dashboard">Performance</a></li>
        <li><a href="/resume">Resume</a></li>
        <li><a href="#" onclick="handleLogout()">Logout</a></li>
      </ul>
    </div>
  </nav>

  <div class="container" id="main-container">
    <h1 id="page-title" style="margin: 40px 0 20px;">Company Wise Placement Tests</h1>

    <div id="timer-container" class="timer-container hidden">
      <span id="test-title">Company Placement Test</span>
      <span id="timer">Time Left: 00:00</span>
    </div>

    <div id="test-instruction" class="alert alert-info">
      Attempt structured company-specific placement tests. Reattempts are allowed, and solutions stay available after each attempt.
    </div>

    <div id="company-tests" class="grid grid-3" style="margin-top: 30px;"></div>

    <div id="test-sections" class="grid grid-3 hidden"></div>

    <div id="questions-container" class="questions-container hidden"></div>

    <div id="submit-container" class="submit-container hidden">
      <button class="btn btn-primary" onclick="submitTest()">Submit Test</button>
    </div>
  </div>

  <script src="/static/js/app.js"></script>
</body>
</html>
